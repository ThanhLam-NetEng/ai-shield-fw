<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Shield Firewall — Dashboard</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f1117;
        color: #e2e8f0;
        min-height: 100vh;
      }
      .header {
        background: #1a1d2e;
        border-bottom: 1px solid #2d3748;
        padding: 16px 32px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .header h1 {
        font-size: 20px;
        font-weight: 600;
        color: #fff;
      }
      .header .badge {
        background: #22c55e22;
        color: #22c55e;
        border: 1px solid #22c55e44;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 13px;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 32px;
      }
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 16px;
        margin-bottom: 32px;
      }
      .stat-card {
        background: #1a1d2e;
        border: 1px solid #2d3748;
        border-radius: 12px;
        padding: 24px;
      }
      .stat-card .label {
        font-size: 13px;
        color: #94a3b8;
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .stat-card .value {
        font-size: 36px;
        font-weight: 700;
      }
      .stat-card.block .value {
        color: #ef4444;
      }
      .stat-card.redact .value {
        color: #f59e0b;
      }
      .stat-card.allow .value {
        color: #22c55e;
      }
      .stat-card.total .value {
        color: #60a5fa;
      }
      .section {
        background: #1a1d2e;
        border: 1px solid #2d3748;
        border-radius: 12px;
        padding: 24px;
        margin-bottom: 24px;
      }
      .section h2 {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 20px;
        color: #fff;
      }
      .bar-chart {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .bar-row {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .bar-label {
        width: 220px;
        font-size: 13px;
        color: #94a3b8;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .bar-track {
        flex: 1;
        background: #2d3748;
        border-radius: 4px;
        height: 8px;
      }
      .bar-fill {
        height: 8px;
        border-radius: 4px;
        background: #ef4444;
        transition: width 0.5s ease;
      }
      .bar-count {
        width: 40px;
        text-align: right;
        font-size: 13px;
        color: #e2e8f0;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
      }
      th {
        text-align: left;
        padding: 10px 12px;
        border-bottom: 1px solid #2d3748;
        color: #94a3b8;
        font-weight: 500;
        font-size: 12px;
        text-transform: uppercase;
      }
      td {
        padding: 12px;
        border-bottom: 1px solid #1e2433;
        vertical-align: middle;
      }
      tr:last-child td {
        border-bottom: none;
      }
      tr:hover td {
        background: #1e2433;
      }
      .badge-block {
        background: #ef444422;
        color: #ef4444;
        border: 1px solid #ef444444;
        padding: 2px 10px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
      }
      .badge-redact {
        background: #f59e0b22;
        color: #f59e0b;
        border: 1px solid #f59e0b44;
        padding: 2px 10px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
      }
      .badge-allow {
        background: #22c55e22;
        color: #22c55e;
        border: 1px solid #22c55e44;
        padding: 2px 10px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
      }
      .preview {
        color: #94a3b8;
        font-size: 13px;
        max-width: 300px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .ts {
        color: #64748b;
        font-size: 12px;
        font-family: monospace;
      }
      .loading {
        text-align: center;
        color: #64748b;
        padding: 40px;
      }
      .error {
        text-align: center;
        color: #ef4444;
        padding: 40px;
      }
      .refresh-btn {
        background: #2d3748;
        color: #e2e8f0;
        border: none;
        padding: 8px 16px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
      }
      .refresh-btn:hover {
        background: #374151;
      }
      .block-rate {
        font-size: 13px;
        color: #94a3b8;
        margin-top: 4px;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>🛡️ AI Shield Firewall</h1>
      <div style="display: flex; align-items: center; gap: 12px">
        <span class="badge">● Live</span>
        <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
      </div>
    </div>

    <div class="container">
      <div class="stats-grid" id="stats-grid">
        <div class="loading">Loading...</div>
      </div>
      <div class="section" id="violations-section" style="display: none">
        <h2>Top Violation Types</h2>
        <div class="bar-chart" id="bar-chart"></div>
      </div>
      <div class="section">
        <h2>Recent Activity (last 20)</h2>
        <div id="table-container"><div class="loading">Loading...</div></div>
      </div>
    </div>

    <script>
      async function loadData() {
        try {
          const res = await fetch("/v1/dashboard/stats");
          const data = await res.json();
          if (data.error) throw new Error(data.error);
          renderStats(data);
          renderBarChart(data.violation_types);
          renderTable(data.recent);
        } catch (e) {
          document.getElementById("stats-grid").innerHTML =
            `<div class="error">Error: ${e.message}</div>`;
        }
      }

      function renderStats(data) {
        const { stats, total, block_rate } = data;
        document.getElementById("stats-grid").innerHTML = `
        <div class="stat-card total">
          <div class="label">Total Requests</div>
          <div class="value">${total}</div>
        </div>
        <div class="stat-card block">
          <div class="label">Blocked</div>
          <div class="value">${stats.BLOCK || 0}</div>
          <div class="block-rate">Block rate: ${block_rate}%</div>
        </div>
        <div class="stat-card redact">
          <div class="label">Redacted</div>
          <div class="value">${stats.REDACT || 0}</div>
        </div>
        <div class="stat-card allow">
          <div class="label">Allowed</div>
          <div class="value">${stats.ALLOW || 0}</div>
        </div>
      `;
      }

      function renderBarChart(violation_types) {
        const entries = Object.entries(violation_types).sort(
          (a, b) => b[1] - a[1],
        );
        if (entries.length === 0) return;
        const max = entries[0][1];
        document.getElementById("violations-section").style.display = "block";
        document.getElementById("bar-chart").innerHTML = entries
          .map(
            ([label, count]) => `
        <div class="bar-row">
          <div class="bar-label" title="${label}">${label}</div>
          <div class="bar-track">
            <div class="bar-fill" style="width:${((count / max) * 100).toFixed(1)}%"></div>
          </div>
          <div class="bar-count">${count}</div>
        </div>
      `,
          )
          .join("");
      }

      function renderTable(recent) {
        if (recent.length === 0) {
          document.getElementById("table-container").innerHTML =
            '<div class="loading">No data yet</div>';
          return;
        }
        const rows = recent
          .map(
            (r) => `
        <tr>
          <td class="ts">${r.timestamp.replace("T", " ").substring(0, 19)}</td>
          <td><span class="badge-${r.action.toLowerCase()}">${r.action}</span></td>
          <td>${r.org_id}</td>
          <td class="preview" title="${r.reason}">${r.reason}</td>
          <td class="preview" title="${r.preview}">${r.preview}</td>
        </tr>
      `,
          )
          .join("");
        document.getElementById("table-container").innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Timestamp (UTC)</th>
              <th>Action</th>
              <th>Org</th>
              <th>Reason</th>
              <th>Preview</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
      }

      loadData();
      setInterval(loadData, 30000);
    </script>
  </body>
</html>
